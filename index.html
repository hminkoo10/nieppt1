<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>코스피 910P 폭락, 개인 투자자는 무엇을 배워야 하는가</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#070a12; --panel:rgba(255,255,255,.045); --line:rgba(255,255,255,.1);
  --txt:#eef1f8; --dim:#9aa3b8;
  --red:#ff4d6d; --orange:#ff9e00; --cyan:#4cc9f0; --green:#2dd4a7; --violet:#8b5cf6;
  --grad:linear-gradient(90deg,var(--red),var(--orange));
  --grad2:linear-gradient(90deg,var(--cyan),var(--violet));
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt); overflow:hidden;
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
}
/* ── 배경 ── */
#bg{position:fixed;inset:0;z-index:0;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(110px);z-index:0;pointer-events:none;animation:drift 22s ease-in-out infinite alternate}
.b1{width:56vw;height:56vw;left:-18vw;top:-22vw;background:rgba(255,77,109,.16)}
.b2{width:48vw;height:48vw;right:-16vw;bottom:-20vw;background:rgba(76,201,240,.13);animation-delay:-8s}
.b3{width:34vw;height:34vw;right:8vw;top:-14vw;background:rgba(139,92,246,.12);animation-delay:-14s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(6vw,4vh) scale(1.15)}}
.gridbg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);
}
/* ── 슬라이드 ── */
#deck{position:relative;z-index:2;height:100%}
.slide{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding:6vh 7vw 12vh;opacity:0;visibility:hidden;transform:translateY(26px) scale(.985);
  transition:opacity .55s ease,transform .55s ease,visibility .55s;
}
.slide.active{opacity:1;visibility:visible;transform:none}
.inner{width:min(1120px,100%)}
.chip{
  display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;letter-spacing:.14em;
  color:var(--cyan);border:1px solid rgba(76,201,240,.35);background:rgba(76,201,240,.08);
  padding:7px 16px;border-radius:999px;margin-bottom:22px;text-transform:uppercase;
}
.chip::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.slide.neg .chip{color:var(--red);border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.08)}
.slide.neg .chip::before{background:var(--red);box-shadow:0 0 10px var(--red)}
.slide.pos .chip{color:var(--green);border-color:rgba(45,212,167,.4);background:rgba(45,212,167,.08)}
.slide.pos .chip::before{background:var(--green);box-shadow:0 0 10px var(--green)}
h2{
  font-size:clamp(30px,4.6vw,56px);font-weight:800;line-height:1.18;letter-spacing:-.02em;margin-bottom:14px;
}
h2 .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--dim);font-size:clamp(15px,1.6vw,20px);margin-bottom:8px}
.rule{width:84px;height:5px;border-radius:99px;background:var(--grad);margin:20px 0 34px;box-shadow:0 0 18px rgba(255,77,109,.55)}
.slide.pos .rule{background:linear-gradient(90deg,var(--green),var(--cyan));box-shadow:0 0 18px rgba(45,212,167,.5)}
ul.bullets{list-style:none;display:flex;flex-direction:column;gap:14px;max-width:900px}
ul.bullets li{
  position:relative;padding:16px 22px 16px 56px;font-size:clamp(16px,1.9vw,22px);line-height:1.55;
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  backdrop-filter:blur(8px);opacity:0;
}
ul.bullets li::before{
  content:"";position:absolute;left:22px;top:calc(50% - 6px);width:12px;height:12px;border-radius:4px;
  background:var(--grad);transform:rotate(45deg);box-shadow:0 0 12px rgba(255,158,0,.6);
}
.slide.pos ul.bullets li::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
b{color:#fff;font-weight:800;background:linear-gradient(transparent 62%,rgba(255,77,109,.35) 62%)}
.slide.pos b{background:linear-gradient(transparent 62%,rgba(45,212,167,.3) 62%)}
.slide.active ul.bullets li{animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both}
.slide.active ul.bullets li:nth-child(1){animation-delay:.15s}
.slide.active ul.bullets li:nth-child(2){animation-delay:.27s}
.slide.active ul.bullets li:nth-child(3){animation-delay:.39s}
.slide.active ul.bullets li:nth-child(4){animation-delay:.51s}
.slide.active ul.bullets li:nth-child(5){animation-delay:.63s}
.slide.active ul.bullets li:nth-child(6){animation-delay:.75s}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
/* 수식 pill */
.formula{
  display:inline-block;font-size:clamp(18px,2.4vw,28px);font-weight:800;letter-spacing:.02em;
  padding:16px 30px;border-radius:16px;margin-bottom:28px;
  background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.45);color:#d9ccff;
  box-shadow:0 0 30px rgba(139,92,246,.25);
}
/* 인용 chips (기사 표현) */
.quotes{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:30px}
.quotes span{
  font-size:clamp(20px,2.6vw,32px);font-weight:900;padding:12px 26px;border-radius:14px;
  color:var(--red);background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.45);
  box-shadow:0 0 24px rgba(255,77,109,.25);animation:pulse 2.4s ease-in-out infinite;
}
.quotes span:nth-child(2){animation-delay:.4s}.quotes span:nth-child(3){animation-delay:.8s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
/* ── 표지 ── */
.cover{text-align:center}
.cover .date{
  display:inline-block;font-weight:800;letter-spacing:.3em;color:var(--orange);font-size:clamp(14px,1.6vw,18px);
  border:1px solid rgba(255,158,0,.4);background:rgba(255,158,0,.08);padding:10px 26px 10px 30px;border-radius:999px;margin-bottom:34px;
}
.cover h1{font-size:clamp(38px,6.2vw,84px);font-weight:900;line-height:1.14;letter-spacing:-.03em}
.cover h1 .big{
  display:inline-block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 26px rgba(255,77,109,.4));animation:fall 1.1s cubic-bezier(.2,.9,.3,1.2) both .3s;
}
@keyframes fall{from{opacity:0;transform:translateY(-60px)}to{opacity:1;transform:none}}
.cover .subtitle{color:var(--dim);font-size:clamp(16px,2vw,23px);margin:26px auto 0;max-width:820px;line-height:1.6}
.cover .meta{margin-top:38px;font-size:clamp(15px,1.7vw,19px);color:#cdd4e4;font-weight:600}
.cover .tags{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.cover .tags span{
  font-size:14px;font-weight:700;color:var(--cyan);padding:8px 18px;border-radius:999px;
  border:1px solid rgba(76,201,240,.35);background:rgba(76,201,240,.07);
}
.arrowdown{font-size:clamp(40px,6vw,72px);color:var(--red);display:inline-block;animation:drop 1.6s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(255,77,109,.7));margin:0 6px}
@keyframes drop{0%,100%{transform:translateY(-6px)}50%{transform:translateY(8px)}}
/* ── 통계 카드 ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px;margin-top:8px}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:30px 28px;
  backdrop-filter:blur(8px);opacity:0;position:relative;overflow:hidden;
}
.card::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% -20%,rgba(255,77,109,.16),transparent 55%);pointer-events:none}
.card.blue::after{background:radial-gradient(circle at 85% -20%,rgba(76,201,240,.16),transparent 55%)}
.card.gold::after{background:radial-gradient(circle at 85% -20%,rgba(255,158,0,.16),transparent 55%)}
.slide.active .card{animation:fadeUp .7s cubic-bezier(.2,.7,.2,1) both}
.slide.active .card:nth-child(1){animation-delay:.15s}
.slide.active .card:nth-child(2){animation-delay:.3s}
.slide.active .card:nth-child(3){animation-delay:.45s}
.slide.active .card:nth-child(4){animation-delay:.6s}
.slide.active .card:nth-child(5){animation-delay:.75s}
.slide.active .card:nth-child(6){animation-delay:.9s}
.card .k{font-size:15px;font-weight:800;letter-spacing:.1em;color:var(--dim);margin-bottom:12px;text-transform:uppercase}
.card .v{font-size:clamp(30px,3.6vw,48px);font-weight:900;letter-spacing:-.02em;line-height:1.1}
.card .v.down{color:var(--red);text-shadow:0 0 24px rgba(255,77,109,.4)}
.card .v.up{color:var(--green);text-shadow:0 0 24px rgba(45,212,167,.4)}
.card .v.warn{color:var(--orange);text-shadow:0 0 24px rgba(255,158,0,.35)}
.card .d{margin-top:12px;color:var(--dim);font-size:clamp(14px,1.5vw,17px);line-height:1.5}
/* ── 바 차트 ── */
.bars{display:flex;flex-direction:column;gap:26px;margin-top:10px;max-width:960px}
.brow{opacity:0}
.slide.active .brow{animation:fadeUp .6s both}
.slide.active .brow:nth-child(1){animation-delay:.2s}
.slide.active .brow:nth-child(2){animation-delay:.35s}
.slide.active .brow:nth-child(3){animation-delay:.5s}
.brow .lbl{display:flex;justify-content:space-between;font-size:clamp(16px,1.8vw,21px);font-weight:700;margin-bottom:10px}
.brow .lbl .amt{font-weight:900}
.brow .lbl .amt.sell{color:var(--red)}.brow .lbl .amt.buy{color:var(--green)}
.bar{height:34px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);overflow:hidden}
.bar i{display:block;height:100%;width:0;border-radius:12px;transition:width 1.3s cubic-bezier(.2,.7,.2,1) .4s}
.bar i.sell{background:linear-gradient(90deg,#b81d3e,var(--red));box-shadow:0 0 20px rgba(255,77,109,.5)}
.bar i.buy{background:linear-gradient(90deg,#0e8f6f,var(--green));box-shadow:0 0 20px rgba(45,212,167,.5)}
.slide.active .bar i{width:var(--w)}
.chartnote{
  margin-top:30px;display:inline-flex;align-items:center;gap:14px;padding:16px 24px;border-radius:16px;
  background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.35);font-size:clamp(15px,1.7vw,20px);font-weight:700;
}
.chartnote .pct{font-size:clamp(24px,3vw,36px);font-weight:900;color:var(--red)}
/* ── 비교(순매수/순매도) ── */
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:stretch;margin-bottom:30px}
.vsbox{border-radius:22px;padding:30px;text-align:center;opacity:0}
.slide.active .vsbox{animation:fadeUp .7s both}
.slide.active .vsbox:nth-child(1){animation-delay:.15s}
.slide.active .vsbox:nth-child(3){animation-delay:.3s}
.vsbox.buy{background:rgba(45,212,167,.08);border:1px solid rgba(45,212,167,.4)}
.vsbox.sell{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.4)}
.vsbox h3{font-size:clamp(24px,3vw,36px);font-weight:900;margin-bottom:10px}
.vsbox.buy h3{color:var(--green)}.vsbox.sell h3{color:var(--red)}
.vsbox p{color:var(--dim);font-size:clamp(15px,1.8vw,20px);font-weight:600}
.vsmid{display:flex;align-items:center;font-size:clamp(20px,2.6vw,30px);font-weight:900;color:var(--dim)}
/* ── 플로우 ── */
.flow{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:6px 0 30px}
.fstep{
  padding:18px 22px;border-radius:16px;font-size:clamp(15px,1.8vw,21px);font-weight:800;opacity:0;
  background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(8px);
}
.fstep:first-child{border-color:rgba(76,201,240,.5);color:var(--cyan)}
.fstep:last-child{border-color:rgba(255,77,109,.55);color:var(--red);box-shadow:0 0 24px rgba(255,77,109,.25)}
.farr{color:var(--orange);font-size:clamp(18px,2.4vw,28px);font-weight:900;opacity:0}
.slide.active .fstep,.slide.active .farr{animation:fadeUp .5s both}
.slide.active .flow>*:nth-child(1){animation-delay:.15s}.slide.active .flow>*:nth-child(2){animation-delay:.3s}
.slide.active .flow>*:nth-child(3){animation-delay:.45s}.slide.active .flow>*:nth-child(4){animation-delay:.6s}
.slide.active .flow>*:nth-child(5){animation-delay:.75s}.slide.active .flow>*:nth-child(6){animation-delay:.9s}
.slide.active .flow>*:nth-child(7){animation-delay:1.05s}.slide.active .flow>*:nth-child(8){animation-delay:1.2s}
.slide.active .flow>*:nth-child(9){animation-delay:1.35s}
/* ── 개념 그리드 ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.cgrid .card .k2{
  font-size:clamp(19px,2.2vw,26px);font-weight:900;margin-bottom:10px;
  background:var(--grad2);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.cgrid .card .d2{color:#c6cddd;font-size:clamp(14px,1.6vw,18px);line-height:1.55}
/* ── 결론 ── */
.endquote{
  font-size:clamp(24px,3.4vw,44px);font-weight:900;line-height:1.4;letter-spacing:-.02em;
  padding:34px 38px;border-radius:24px;margin-bottom:34px;
  background:linear-gradient(135deg,rgba(255,77,109,.12),rgba(139,92,246,.12));
  border:1px solid rgba(255,255,255,.14);box-shadow:0 0 60px rgba(255,77,109,.15);
}
.endquote .q{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.src{margin-top:28px;font-size:13px;color:rgba(154,163,184,.7);font-weight:600;letter-spacing:.02em}
.cards+.bullets{margin-top:26px}
/* ── UI ── */
#progress{position:fixed;top:0;left:0;height:4px;background:var(--grad);z-index:50;width:0;transition:width .4s ease;box-shadow:0 0 12px rgba(255,77,109,.8)}
#hud{
  position:fixed;bottom:22px;right:26px;z-index:50;display:flex;align-items:center;gap:12px;
  font-size:14px;color:var(--dim);font-weight:700;
}
#hud button{
  all:unset;cursor:pointer;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:17px;font-weight:800;
  transition:.2s;backdrop-filter:blur(8px);
}
#hud button:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
#counter{min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
#hint{position:fixed;bottom:26px;left:28px;z-index:50;font-size:13px;color:rgba(154,163,184,.75);font-weight:600;letter-spacing:.04em}
#hint kbd{border:1px solid var(--line);border-radius:6px;padding:1px 7px;background:var(--panel);margin:0 2px}
/* 발표 노트 패널 */
#notes{
  position:fixed;left:50%;bottom:80px;transform:translate(-50%,20px);width:min(880px,90vw);z-index:60;
  background:rgba(10,14,24,.92);border:1px solid rgba(76,201,240,.35);border-radius:18px;padding:20px 26px;
  font-size:16px;line-height:1.7;color:#dbe2f0;backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:.35s;box-shadow:0 20px 60px rgba(0,0,0,.5);
}
#notes.on{opacity:1;transform:translate(-50%,0);pointer-events:auto}
#notes .nt{font-size:12px;font-weight:800;letter-spacing:.18em;color:var(--cyan);margin-bottom:8px}
/* 목차 오버레이 */
#toc{
  position:fixed;inset:0;z-index:70;background:rgba(5,8,15,.94);backdrop-filter:blur(16px);
  display:none;overflow-y:auto;padding:60px 8vw;
}
#toc.on{display:block}
#toc h3{font-size:26px;font-weight:900;margin-bottom:28px}
#toc .sec{margin-bottom:26px}
#toc .sname{font-size:13px;font-weight:800;letter-spacing:.16em;color:var(--orange);margin-bottom:10px}
#toc a{
  display:inline-block;color:#c9d1e2;text-decoration:none;font-size:16px;font-weight:600;
  padding:8px 16px;margin:0 8px 8px 0;border-radius:10px;border:1px solid var(--line);background:var(--panel);transition:.2s;
}
#toc a:hover{color:#fff;border-color:var(--cyan);background:rgba(76,201,240,.1)}
#toc a .no{color:var(--cyan);font-weight:900;margin-right:8px}
.pnote{display:none}
/* ── 인쇄(PDF 저장) ── */
@media print{
  body{overflow:visible;background:#0b0f1a}
  #bg,.blob,.gridbg,#progress,#hud,#hint,#notes,#toc{display:none!important}
  #deck{height:auto}
  .slide{position:static;opacity:1!important;visibility:visible!important;transform:none!important;min-height:100vh;page-break-after:always}
  .slide *{animation:none!important;opacity:1!important}
  .bar i{width:var(--w)!important}
  .pnote{display:block;margin-top:26px;padding:16px 20px;border-left:4px solid var(--cyan);background:rgba(76,201,240,.06);color:#b9c2d4;font-size:14px;line-height:1.7;border-radius:0 12px 12px 0}
}
@media (max-width:760px){
  .slide{padding:5vh 6vw 14vh}
  .vs{grid-template-columns:1fr}
  .vsmid{justify-content:center}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="gridbg"></div>
<div id="progress"></div>
<div id="deck"></div>

<div id="notes"><div class="nt">📢 발표 노트</div><div id="ntext"></div></div>
<div id="toc"><h3>목차 <span style="color:var(--dim);font-size:15px;font-weight:600">(클릭하면 이동 · ESC로 닫기)</span></h3><div id="toclist"></div></div>

<div id="hint"><kbd>←</kbd><kbd>→</kbd> 이동 · <kbd>N</kbd> 발표 노트 · <kbd>G</kbd> 목차</div>
<div id="hud">
  <button id="btnToc" title="목차 (G)">☰</button>
  <button id="btnNote" title="발표 노트 (N)">📝</button>
  <button id="btnPrev" title="이전 (←)">‹</button>
  <span id="counter">1 / 38</span>
  <button id="btnNext" title="다음 (→)">›</button>
</div>

<script>
/* ───────── 슬라이드 데이터 ───────── */
const S = [

{type:"cover", section:"표지",
 note:"이번 발표에서는 2026년 6월 23일 발생한 국내 주식시장 급락 사건을 중심으로, 코스피와 코스닥이 왜 크게 하락했는지, 이 사건이 개인 투자자와 우리 생활에 어떤 영향을 주는지 살펴본다. 또한 경제 뉴스를 단순히 받아들이는 것이 아니라 비판적으로 해석하는 방법도 함께 생각해 본다."},

{type:"content", section:"01 · 서론", title:"왜 이 뉴스를 선택했는가?",
 bullets:[
  "<b>직접 주식을 매수한 날</b> 발생한 급락",
  "처음에는 코스피 <b>상승을 기대</b>함",

/* ───────── 렌더링 ───────── */
function bulletsHtml(b){return `<ul class="bullets">${b.map(x=>`<li>${x}</li>`).join("")}</ul>`}
function noteHtml(n){return n?`<div class="pnote">📢 ${n}</div>`:""}
function srcHtml(s){return s.src?`<div class="src">${s.src}</div>`:""}

function render(s,i){
  const tint = s.tint ? ` ${s.tint}` : "";
  if(s.type==="cover") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner cover">
    <div class="date">2026. 07. 07</div>
    <h1>코스피 <span class="big">910P 폭락</span><span class="arrowdown">▼</span><br>개인 투자자는 무엇을 배워야 하는가</h1>
    <p class="subtitle">2026년 6월 23일 국내 증시 급락 사건을 통해 본<br>경제 흐름과 비판적 뉴스 읽기</p>
    <p class="meta">통합사회 수행평가 발표 · 발표자: 1601 구현민</p>
    <div class="tags"><span># 경제</span><span># 금융</span><span># 자산 관리</span><span># 합리적 투자</span><span># 비판적 사고</span></div>
    ${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="stats") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="cards">${s.cards.map(c=>`
      <div class="card ${c.card||""}"><div class="k">${c.k}</div><div class="v ${c.cls}">${c.v}</div><div class="d">${c.d}</div></div>`).join("")}
    </div>${s.bullets?bulletsHtml(s.bullets):""}${srcHtml(s)}${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="chart") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="bars">${s.bars.map(b=>`
      <div class="brow"><div class="lbl"><span>${b.lbl}</span><span class="amt ${b.cls}">${b.amt}</span></div>
      <div class="bar"><i class="${b.cls}" style="--w:${b.w}"></i></div></div>`).join("")}
    </div>
    <div class="chartnote">${s.extra} <span class="pct">${s.extraPct}</span></div>
    ${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="compare") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="vs">
      <div class="vsbox buy"><h3>📈 ${s.buy.h}</h3><p>${s.buy.p}</p></div>
      <div class="vsmid">VS</div>
      <div class="vsbox sell"><h3>📉 ${s.sell.h}</h3><p>${s.sell.p}</p></div>
    </div>
    ${bulletsHtml(s.bullets)}${srcHtml(s)}${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="flow") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="flow">${s.steps.map((st,j)=>`<div class="fstep">${st}</div>${j<s.steps.length-1?`<div class="farr">➜</div>`:""}`).join("")}</div>
    ${s.bullets?bulletsHtml(s.bullets):""}${srcHtml(s)}${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="grid") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="cards cgrid">${s.cells.map(c=>`<div class="card"><div class="k2">${c.k}</div><div class="d2">${c.v}</div></div>`).join("")}</div>
    ${noteHtml(s.note)}
  </div></section>`;

  if(s.type==="end") return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    <div class="endquote">${s.quote}</div>
    ${bulletsHtml(s.bullets)}${srcHtml(s)}${noteHtml(s.note)}
  </div></section>`;

  /* content */
  return `
  <section class="slide${tint}" data-i="${i}"><div class="inner">
    <div class="chip">${s.section}</div><h2>${s.title}</h2><div class="rule"></div>
    ${s.formula?`<div class="formula">${s.formula}</div>`:""}
    ${s.quotes?`<div class="quotes">${s.quotes.map(q=>`<span>${q}</span>`).join("")}</div>`:""}
    ${bulletsHtml(s.bullets)}${srcHtml(s)}${noteHtml(s.note)}
  </div></section>`;
}

const deck=document.getElementById("deck");
deck.innerHTML=S.map(render).join("");
const slides=[...document.querySelectorAll(".slide")];
const N=slides.length;
let cur=0, notesOn=false;

/* ───────── 네비게이션 ───────── */
const counted=new Set();
function countUp(el){
  const t=parseFloat(el.dataset.count), d=+(el.dataset.dec||0), dur=1400, st=performance.now();
  (function f(n){
    const p=Math.min(1,(n-st)/dur), e=1-Math.pow(1-p,3);
    el.textContent=(t*e).toLocaleString("ko-KR",{minimumFractionDigits:d,maximumFractionDigits:d});
    if(p<1)requestAnimationFrame(f);
  })(st);
}
function go(i){
  cur=Math.max(0,Math.min(N-1,i));
  slides.forEach((s,j)=>s.classList.toggle("active",j===cur));
  document.getElementById("progress").style.width=(cur/(N-1)*100)+"%";
  document.getElementById("counter").textContent=(cur+1)+" / "+N;
  document.getElementById("ntext").innerHTML=S[cur].note||"(노트 없음)";
  location.hash=cur+1;
  if(!counted.has(cur)){
    slides[cur].querySelectorAll("[data-count]").forEach(countUp);
    counted.add(cur);
  }
}
function next(){go(cur+1)} function prev(){go(cur-1)}

document.getElementById("btnNext").onclick=next;
document.getElementById("btnPrev").onclick=prev;
document.getElementById("btnNote").onclick=toggleNotes;
document.getElementById("btnToc").onclick=toggleToc;

function toggleNotes(){notesOn=!notesOn;document.getElementById("notes").classList.toggle("on",notesOn)}
function toggleToc(force){
  const t=document.getElementById("toc");
  t.classList.toggle("on",force!==undefined?force:!t.classList.contains("on"));
}

addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();next()}
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();prev()}
  else if(e.key==="Home")go(0);
  else if(e.key==="End")go(N-1);
  else if(e.key==="n"||e.key==="N"||e.key==="ㅜ")toggleNotes();
  else if(e.key==="g"||e.key==="G"||e.key==="ㅎ")toggleToc();
  else if(e.key==="Escape")toggleToc(false);
});

/* 스와이프 */
let tx=null;
addEventListener("touchstart",e=>tx=e.touches[0].clientX,{passive:true});
addEventListener("touchend",e=>{
  if(tx===null)return;
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>60)(dx<0?next:prev)();
  tx=null;
},{passive:true});

/* 목차 */
const secs={};
S.forEach((s,i)=>{
  const key=s.section||"기타";
  (secs[key]=secs[key]||[]).push({i,t:s.title||"표지"});
});
document.getElementById("toclist").innerHTML=Object.entries(secs).map(([k,v])=>`
  <div class="sec"><div class="sname">${k}</div>
  ${v.map(x=>`<a href="#${x.i+1}" data-i="${x.i}"><span class="no">${String(x.i+1).padStart(2,"0")}</span>${x.t}</a>`).join("")}
  </div>`).join("");
document.getElementById("toclist").addEventListener("click",e=>{
  const a=e.target.closest("a"); if(!a)return;
  e.preventDefault(); go(+a.dataset.i); toggleToc(false);
});

/* ───────── 배경 캔버스 (하락 차트) ───────── */
const cv=document.getElementById("bg"), ctx=cv.getContext("2d");
const STEP=14; let W,H,pts=[];
function resize(){
  W=cv.width=innerWidth; H=cv.height=innerHeight; pts=[];
  let y=H*0.3;
  for(let i=0;i<W/STEP+2;i++){y+=(Math.random()-0.42)*26;y=Math.min(Math.max(y,H*0.08),H*0.92);pts.push(y)}
}
resize(); addEventListener("resize",resize);
setInterval(()=>{
  let ny=pts[pts.length-1]+(Math.random()-0.42)*26;
  if(ny>H*0.92||ny<H*0.08)ny=H*0.3;
  pts.push(ny); pts.shift();
},130);
(function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(i*STEP,p):ctx.moveTo(0,p));
  ctx.strokeStyle="rgba(255,77,109,.22)"; ctx.lineWidth=2;
  ctx.shadowColor="rgba(255,77,109,.5)"; ctx.shadowBlur=14; ctx.stroke();
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.shadowBlur=0; ctx.fillStyle="rgba(255,77,109,.04)"; ctx.fill();
  requestAnimationFrame(draw);
})();

/* 시작 위치 */
go(Math.max(0,Math.min(N-1,(parseInt(location.hash.slice(1),10)||1)-1)));
</script>
</body>
</html>
